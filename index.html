    Add option to add timer to specific events
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet">

    <style>
        *{
            margin: 0px;
            font-family:  'Jost', sans-serif;
        }
        body {
            background-color: gainsboro;
        }
        .gradient_background{
            background: linear-gradient(300deg, #974EC3, #313866, #504099);
            background-size: 180% 180%;
            animation: gradient-animation 18s ease infinite;
        }
        header {
            height: 150px;
            display: flex;
        }
        .heading{
            padding: 15px 10px;
            align-self: flex-end;
        }
        .heading > h1{
            font-size: 45px; color: whitesmoke; 
            font-weight: lighter;
            font-family: Arial, Helvetica, sans-serif; 
        }
        .heading > p{
            font-size: 20px;  
            color: whitesmoke;
        }
        @keyframes gradient-animation {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        .passive{text-decoration: line-through;}
        .hidden{display: none;}
        .ribbon{
            display: grid;
            grid-template-columns: 5fr 1fr;
            width: 100%;
            margin: 4px 0px;
            gap: 20px;
        }
        #mainField{
            font-size: 20px;
            width: 100%;
            height: 42px;
            margin-left: 2px;
            padding-left: 10px;
            border: 2px solid gray;
            border-radius: 5px;
        }
        .searchBar{
            display: flex;
            justify-content: space-between;
            min-width: 215px;
            height: 44px;
            margin-right: 2px;
            border-radius: 4px;
            border: 2px solid gray;
        }
        #backBtn, #search, #searchBtn{
            font-size: 20px;
            height: 41.5px;
            border: none;
        }
        #search{
            width: 100%;
        }
        #searchBtn{
            height: inherit;
            border-radius: 0 2px 2px 0;
            cursor: pointer;
            background-color: gainsboro;
            font-weight: bold;
        }
        #backBtn{
            height: inherit;
            width: 50px;
            border-radius: 2px 0 0 2px;
            cursor: pointer;
            background-color: gainsboro;
        }
        #backBtn:hover, #searchBtn:hover{
            background-color: gray;
        }
        #backBtn > img{
            position: relative;
            top:3.5px;
        }
        .container{
            width: 99%;
            height: 35px;
            display: flex;
            justify-content: space-between;
            border: 1px solid black;
            border-radius: 5px;
            background-color: white;
            margin: 5px;
            
        }
        .container > label{
            font-size: 25px;
            padding-left: 15px;
            width: 100%;
            cursor: pointer;
        }
        .removeBtn{
            font-size: 20px;
            font-weight: bold;
            border: none;
            background-color: gainsboro;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
        }
        .removeBtn:hover{
            background-color: gray;
        }
        .popUp{
            width: 100%;
            height: 100vh;
            transform: scale(0);
            text-align: center;
            z-index: 10;
        }
        .active{
            transform: scale(1);
        }
        .popUp > h1{
            color: #504099;
            position: relative;
            top: -40px;
        }
        footer {
            height: 20vh;
        }
        .contact > p{
            padding: 20px 0 10px 20px;
            color: whitesmoke;
            font-size: 25px;
        } 
        .links{
            display: flex;
            gap: 10px;
            padding: 0px 20px;
        }
    </style>
</head>
<body>
    <header class="gradient_background">
        <div class="heading">
            <h1>My Day</h1>
            <p id="date_time"></p>
        </div> 
    </header>
    <div class="main">
        <div class="ribbon">
            <div class="addTask">
                <input type="text" id="mainField" placeholder=" + Add a task">
            </div>
            <div class="searchBar">
                <button id="backBtn" onclick="restoreOriginal();"><img src="./images/img-back-button.png" width="25px"></button>
                <input type="text" id="search"><button id="searchBtn" type="button" onclick="searchTask();">Search</button> 
            </div>
        </div>
        <div id="result"></div>
        <div id="popUp" class="popUp">
            <img src="./images/img-not-found.png" width="200px">
            <h1>Nobody here but us chickens</h1>
        </div>
    </div>
    <footer class="gradient_background">
        <div class="contact">
            <p>- BY KARAN BISHT</p>
            <div class="links">
                <a href="https://instagram.com/karan_b1603" target="_blank">
                  <img src="./images/img-instagram.png" width="45px"></a>
                <a href="https://twitter.com/karan_b1603" target="_blank">
                  <img src="./images/img-twitter.png" width="45px"></a>
                <a href="https://github.com/Karan-Bisht16" target="_blank">
                  <img src="./images/img-github.png" width="45px"></a>
                <a href="https://www.linkedin.com/in/karan-bisht-583918254/" target="_blank">
                  <img src="./images/img-linkedin.png" width="45px"></a>
            </div>
        </div>
    </footer>
    <script>
        window.onbeforeunload = function() {
            return "Data will be lost if you leave the page, are you sure?";
        };

        const date_time = document.getElementById('date_time');
        const date = new Date();
        const dayName = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        date_time.innerHTML = dayName[date.getDay()]+', '+monthNames[date.getMonth()]+' '+date.getDate();
        
        const mainInput = document.getElementById('mainField');
        const resultDiv = document.getElementById('result');

        let i=0;
        let arrayOfTasks = [];

        function addTaskOperation(){
            popUp.classList.remove('active');
            restoreOriginal();
            if (mainInput.value.trim()!==''){
                i++;
                resultDiv.innerHTML+=
                `<div class='visible' id='activity`+i+`'>
                    <div class='container'>
                        <label id='label`+i+`'><input type='checkbox' onclick='strikeTask(this);' value=`+i+`> `+mainInput.value.trim()+`</label>
                        <button class='removeBtn' onclick='remove(this);' value=`+i+`>Remove</button>
                    </div>
                </div>`;
                arrayOfTasks.push(mainInput.value.trim());
            }
            mainInput.value='';
        }
            
        function strikeTask(element){
            const toStrike =document.getElementById('label'+element.value);
            var string = toStrike.innerHTML;
            if (!toStrike.classList.contains('passive')){
                toStrike.classList.add('passive');
                var index = toStrike.innerHTML.indexOf("value=")
                var stringFirst = string.slice(0, index);
                stringFirst+='checked ';
                string = stringFirst.concat(string.slice(index, string.length));
                toStrike.innerHTML=string;
            } else{
                toStrike.classList.remove('passive');
                var index = toStrike.innerHTML.indexOf("checked")
                var stringFirst = string.slice(0, index-1);
                index+=10;
                string = stringFirst.concat(string.slice(index, string.length));
                toStrike.innerHTML=string;
            }
        }
        function remove(element){
            const todelete =document.getElementById('activity'+element.value);
            todelete.innerHTML='';
            var i = parseInt(element.value)-1;
            arrayOfTasks[i]=0;                                  /*arr.splice(i,1);*/
        }
        
        const allTasks = document.getElementsByClassName('visible');
        const searchValue = document.getElementById('search');
        const popUp = document.getElementById('popUp');

        function searchTask(){
            popUp.classList.remove('active');
            for (var i=0; i<arrayOfTasks.length; i++){
                allTasks[i].classList.add('hidden');                    
            }
            if (arrayOfTasks.indexOf(searchValue.value)!==-1){
                var index = arrayOfTasks.indexOf(searchValue.value)+1;
                const found = document.getElementById('activity'+index);
                found.classList.remove('hidden');
            }
            else{
                popUp.classList.add('active');
            }
            searchValue.value='';
        }
        function restoreOriginal(){
            for (var i=0; i<arrayOfTasks.length; i++){
                allTasks[i].classList.remove('hidden');                    
            }
        }
        mainInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                addTaskOperation();
            }
        });
        searchValue.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                document.getElementById("searchBtn").click();
            }
        });
    </script>
</body>
</html>
